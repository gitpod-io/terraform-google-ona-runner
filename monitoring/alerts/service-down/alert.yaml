apiVersion: 1
groups:
  - name: gcp-runner-service-down
    interval: 30s
    rules:
      - alert: GCPRunnerServiceDown
        expr: up{job="gcp_runner"} == 0 or up{job="gcp_auth_proxy"} == 0 or up{job="gcp_proxy"}
        for: 1m
        labels:
          severity: critical
          component: gcp-runner
          alert_type: service_availability
        annotations:
          summary: "GCP Runner service is down"
          description: "GCP Runner service ({{ $labels.job }} on {{ $labels.instance }}) has been down for more than 1 minute. This affects all environment operations."
          impact: "Complete service outage - users cannot create, start, or manage environments"
          runbook_url: "https://github.com/gitpod-io/terraform-google-ona-runner/blob/main/monitoring/alerts/critical/service-down/runbook.md"
